<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo Tabela</title>
    <style>
       table, td, tr, th{
            border: solid 1px blue;
       } 
    </style>
</head>

<body>
    <table> <!-- border é um atributo obsoleto, deve-se utilizar css -->
        <thead>
            <tr>
                <th>Aluno</th>
                <th>Nota</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Fulano</td>
                <td>8.5</td>
            </tr>
            <tr>

                <td>Sicrana</td>
                <td>9.0</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2"><strong>Minha Tabela</strong></td>
            </tr>
        </tfoot>
    </table>
</body>

</html>
